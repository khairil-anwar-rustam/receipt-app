<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Compressor + Renamer</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  padding:20px;
}

.container{
  max-width:1000px;
  margin:auto;
}

.upload-box{
  border:2px dashed #334155;
  padding:50px;
  text-align:center;
  border-radius:20px;
  cursor:pointer;
}

.controls{
  margin-top:15px;
  display:grid;
  gap:10px;
}

input,select,button{
  padding:10px;
  border-radius:10px;
  border:none;
}

.preview-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
  margin-top:20px;
}

.card{
  background:#111827;
  padding:10px;
  border-radius:15px;
}

img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:10px;
}

button{
  cursor:pointer;
}

.primary{background:#38bdf8;}
.green{background:#22c55e;}
</style>
</head>

<body>

<div class="container">

  <div class="upload-box" id="uploadBox">
    <h2>Upload Images</h2>
    <p>Tap to select multiple images</p>
  </div>

  <input type="file" id="imageInput" multiple accept="image/*">

  <div class="controls">

    <input type="text" id="prefix" placeholder="Filename prefix">

    <select id="format">
      <option value="image/jpeg">JPG</option>
      <option value="image/webp">WEBP</option>
      <option value="image/png">PNG</option>
    </select>

    <input type="range" id="quality" min="10" max="100" value="70">

    <button class="primary" id="compressBtn">Compress</button>
    <button class="green" id="downloadAll">Download All</button>

  </div>

  <div id="status"></div>

  <div class="preview-grid" id="preview"></div>

</div>

<script>

const uploadBox = document.getElementById('uploadBox');
const imageInput = document.getElementById('imageInput');
const preview = document.getElementById('preview');
const status = document.getElementById('status');

const compressBtn = document.getElementById('compressBtn');
const downloadAllBtn = document.getElementById('downloadAll');

const prefixInput = document.getElementById('prefix');
const formatSelect = document.getElementById('format');
const qualityInput = document.getElementById('quality');

let files = [];
let results = [];

/* FIX UPLOAD BUTTON (MAIN FIX) */
uploadBox.addEventListener('click', openPicker);
uploadBox.addEventListener('touchstart', openPicker);

function openPicker(e){
  e.preventDefault();
  imageInput.click();
}

/* MULTI FILE SUPPORT */
imageInput.addEventListener('change', (e) => {

  const newFiles = Array.from(e.target.files);
  files.push(...newFiles);

  imageInput.value = '';

  render();
});

function render(){

  preview.innerHTML = '';

  files.forEach((file,i) => {

    const reader = new FileReader();

    reader.onload = (e) => {

      const div = document.createElement('div');
      div.className = 'card';

      div.innerHTML = `
        <img src="${e.target.result}">
        <p>${file.name}</p>
        <p id="st-${i}">Waiting</p>
        <button id="btn-${i}" disabled>Not Ready</button>
      `;

      preview.appendChild(div);

    };

    reader.readAsDataURL(file);

  });

  status.innerText = files.length + " images loaded";
}

/* COMPRESS */
compressBtn.onclick = async () => {

  results = [];

  const quality = qualityInput.value / 100;
  const format = formatSelect.value;
  const prefix = prefixInput.value || "image";

  for(let i=0;i<files.length;i++){

    const blob = await compress(files[i],quality,format);

    const name = `${prefix}_${i+1}.${format.split('/')[1]}`;

    results.push({blob,name});

    const btn = document.getElementById(`btn-${i}`);
    const st = document.getElementById(`st-${i}`);

    btn.disabled = false;
    btn.innerText = "Download";

    const url = URL.createObjectURL(blob);

    btn.onclick = () => download(url,name);

    st.innerText = "Done";

  }

  status.innerText = "Compression complete";
};

function compress(file,quality,format){

  return new Promise(resolve => {

    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = () => {

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      let w = img.width;
      let h = img.height;

      const max = 2000;

      if(w>max || h>max){
        if(w>h){
          h = h*(max/w);
          w = max;
        } else {
          w = w*(max/h);
          h = max;
        }
      }

      canvas.width = w;
      canvas.height = h;

      ctx.drawImage(img,0,0,w,h);

      canvas.toBlob(blob => resolve(blob),format,quality);

    };

    reader.readAsDataURL(file);

  });

}

/* DOWNLOAD */
function download(url,name){

  const a = document.createElement('a');
  a.href = url;
  a.download = name;
  a.click();

}

/* DOWNLOAD ALL */
downloadAllBtn.onclick = () => {

  results.forEach((f,i) => {

    const url = URL.createObjectURL(f.blob);

    setTimeout(() => {
      download(url,f.name);
    },i*300);

  });

};

</script>

</body>
  </html>
