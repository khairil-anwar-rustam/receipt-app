<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receipt Report Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:#fff;
}

.container{
  padding:16px;
  max-width:900px;
  margin:auto;
}

h1{
  font-size:22px;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:#000;
  font-weight:bold;
  margin-top:10px;
}

.receipt-list{
  margin-top:15px;
}

.card{
  background:#1e293b;
  padding:12px;
  border-radius:10px;
  margin-bottom:12px;
}

.card-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
}

.card-info{
  font-size:14px;
}

.card img{
  width:100%;
  border-radius:8px;
  margin-top:10px;
}

.delete-btn{
  background:#ef4444;
  color:#fff;
  border:none;
  border-radius:6px;
  padding:4px 8px;
  font-size:12px;
}
</style>
</head>

<body>
<div class="container">
  <h1>Receipt Report</h1>

  <input type="date" id="date">
  <input type="text" id="purpose" placeholder="Purpose">
  <input type="number" id="amount" placeholder="Amount (RM)">
  <input type="file" id="receipt" accept="image/*">

  <div class="receipt-list" id="list"></div>

  <button onclick="generatePDF()">Generate PDF</button>
</div>

<script>
const { jsPDF } = window.jspdf;
let receipts = [];

function compressImage(file){
  return new Promise(resolve => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = () => {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      const maxWidth = 800;
      const scale = maxWidth / img.width;

      canvas.width = maxWidth;
      canvas.height = img.height * scale;

      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      resolve(canvas.toDataURL('image/jpeg', 0.8));
    };

    reader.readAsDataURL(file);
  });
}

// auto add receipt

document.getElementById('receipt').addEventListener('change', async function(){
  const file = this.files[0];
  if(!file) return;

  const date = document.getElementById('date').value;
  const purpose = document.getElementById('purpose').value;
  const amount = document.getElementById('amount').value;

  if(!date || !purpose){
    alert('Please fill Date and Purpose first');
    this.value = '';
    return;
  }

  const imgData = await compressImage(file);

  receipts.push({ date, purpose, amount, imgData });

  this.value = '';
  document.getElementById('amount').value = '';

  renderList();
});

function deleteReceipt(index){
  receipts.splice(index,1);
  renderList();
}

function renderList(){
  const list = document.getElementById('list');
  list.innerHTML = '';

  receipts.forEach((r, index) => {
    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <div class="card-header">
        <div class="card-info">
          <div><b>Date:</b> ${r.date}</div>
          <div><b>Purpose:</b> ${r.purpose}</div>
          <div><b>Amount:</b> RM ${r.amount || '-'}</div>
        </div>
        <button class="delete-btn" onclick="deleteReceipt(${index})">Delete</button>
      </div>
      <img src="${r.imgData}">
    `;

    list.appendChild(div);
  });
}

// FIXED PDF (no overflow)
async function generatePDF(){
  const doc = new jsPDF('p','mm','a4');

  for(let i = 0; i < receipts.length; i++){
    const r = receipts[i];

    if(i !== 0){
      doc.addPage();
    }

    let y = 15;

    doc.setFontSize(16);
    doc.text('Receipt Report', 10, y);

    y += 10;

    doc.setFontSize(11);

    doc.text(`Date: ${r.date}`, 10, y);
    y += 6;

    doc.text(`Purpose: ${r.purpose}`, 10, y);
    y += 6;

    doc.text(`Amount: RM ${r.amount || '-'}`, 10, y);
    y += 8;

    const img = new Image();
    img.src = r.imgData;

    await new Promise(resolve => img.onload = resolve);

    const pageWidth = 190;
    const maxPageHeight = 280;

    let imgWidth = pageWidth;
    let imgHeight = (img.height / img.width) * imgWidth;

    if(imgHeight > 240){
      imgHeight = 240;
      imgWidth = (img.width / img.height) * imgHeight;
    }

    // FIX OVERFLOW
    if(y + imgHeight > maxPageHeight){
      doc.addPage();
      y = 15;
    }

    doc.addImage(r.imgData, 'JPEG', 10, y, imgWidth, imgHeight);
  }

  doc.save('receipt-report.pdf');
}
</script>
</body>
  </html>
