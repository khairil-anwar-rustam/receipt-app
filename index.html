<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Compressor + Renamer</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0f172a;
  color:white;
  font-family:Arial,sans-serif;
  padding:20px;
}

.container{
  max-width:1100px;
  margin:auto;
}

.title{
  text-align:center;
  margin-bottom:25px;
}

.title h1{
  font-size:32px;
  margin-bottom:10px;
}

.card{
  background:#111827;
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
  border:1px solid #1f2937;
}

.upload-box{
  border:2px dashed #334155;
  border-radius:20px;
  padding:50px 20px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}

.upload-box:hover{
  border-color:#38bdf8;
  background:#0b1220;
}

.upload-box h2{
  margin-bottom:10px;
}

.upload-box p{
  color:#cbd5e1;
}

input[type=file]{
  display:none;
}

.controls{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  margin-top:20px;
}

.control{
  display:flex;
  flex-direction:column;
  gap:8px;
}

label{
  color:#cbd5e1;
  font-size:14px;
}

input,
select{
  padding:12px;
  border:none;
  border-radius:12px;
  background:#1e293b;
  color:white;
}

.range-value{
  color:#38bdf8;
  font-size:13px;
}

.actions{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-top:20px;
}

button{
  border:none;
  border-radius:14px;
  padding:14px 18px;
  cursor:pointer;
  font-weight:bold;
}

.primary{
  background:#38bdf8;
  color:#001018;
}

.secondary{
  background:#1e293b;
  color:white;
}

.download-btn{
  width:100%;
  margin-top:12px;
  background:#22c55e;
  color:white;
}

.preview-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:18px;
}

.preview-card{
  background:#111827;
  border-radius:18px;
  overflow:hidden;
  border:1px solid #1f2937;
}

.preview-image{
  width:100%;
  height:220px;
  object-fit:cover;
  background:black;
}

.preview-info{
  padding:14px;
}

.preview-info h3{
  font-size:14px;
  margin-bottom:10px;
  word-break:break-all;
}

.info-row{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
  font-size:13px;
  color:#cbd5e1;
}

.status{
  margin-top:15px;
  color:#38bdf8;
}

.footer{
  text-align:center;
  margin-top:30px;
  color:#94a3b8;
  font-size:13px;
}

@media(max-width:600px){

  .title h1{
    font-size:24px;
  }

  .preview-image{
    height:180px;
  }

}
</style>
</head>
<body>

<div class="container">

  <div class="title">
    <h1>📸 Image Compressor + Renamer</h1>
    <p>Upload → Compress → Rename → Download</p>
  </div>

  <div class="card">

    <div class="upload-box" id="uploadBox">
      <h2>Upload Images</h2>
      <p>Tap to select multiple images</p>
    </div>

    <input
      type="file"
      id="imageInput"
      accept="image/*"
      multiple="multiple"
    >

    <div class="controls">

      <div class="control">
        <label>Compression Quality</label>
        <input type="range" id="quality" min="10" max="100" value="70">
        <div class="range-value" id="qualityValue">70%</div>
      </div>

      <div class="control">
        <label>Rename Prefix</label>
        <input type="text" id="prefix" placeholder="example: project_image">
      </div>

      <div class="control">
        <label>Output Format</label>

        <select id="format">
          <option value="image/jpeg">JPG</option>
          <option value="image/webp">WEBP</option>
          <option value="image/png">PNG</option>
        </select>
      </div>

    </div>

    <div class="actions">
      <button class="primary" id="compressBtn">
        Compress Images
      </button>

      <button class="secondary" id="downloadAllBtn">
        Download All
      </button>
    </div>

    <div class="status" id="status"></div>

  </div>

  <div class="preview-grid" id="previewGrid"></div>

  <div class="footer">
    Works fully offline on GitHub Pages
  </div>

</div>

<script>

const imageInput = document.getElementById('imageInput');
const uploadBox = document.getElementById('uploadBox');

const previewGrid = document.getElementById('previewGrid');
const compressBtn = document.getElementById('compressBtn');
const downloadAllBtn = document.getElementById('downloadAllBtn');

const qualitySlider = document.getElementById('quality');
const qualityValue = document.getElementById('qualityValue');

const prefixInput = document.getElementById('prefix');
const formatSelect = document.getElementById('format');

const statusText = document.getElementById('status');

let uploadedFiles = [];
let compressedFiles = [];

uploadBox.addEventListener('click', () => {
  imageInput.click();
});

qualitySlider.addEventListener('input', () => {
  qualityValue.innerText = qualitySlider.value + '%';
});

imageInput.addEventListener('change', (e) => {

  const newFiles = Array.from(e.target.files);

  for(const file of newFiles){
    uploadedFiles.push(file);
  }

  compressedFiles = [];

  renderPreview();

  imageInput.value = '';

});

function formatBytes(bytes){

  if(bytes < 1024){
    return bytes + ' B';
  }

  if(bytes < 1048576){
    return (bytes / 1024).toFixed(1) + ' KB';
  }

  return (bytes / 1048576).toFixed(2) + ' MB';

}

function renderPreview(){

  previewGrid.innerHTML = '';

  if(uploadedFiles.length === 0){

    statusText.innerText = 'No image selected';

    return;

  }

  statusText.innerText =
    uploadedFiles.length + ' image(s) loaded';

  uploadedFiles.forEach((file,index) => {

    const reader = new FileReader();

    reader.onload = (e) => {

      const card = document.createElement('div');

      card.className = 'preview-card';

      card.innerHTML = `
        <img class="preview-image" src="${e.target.result}">

        <div class="preview-info">

          <h3>${file.name}</h3>

          <div class="info-row">
            <span>Original</span>
            <span>${formatBytes(file.size)}</span>
          </div>

          <div class="info-row">
            <span>Status</span>
            <span id="status-${index}">
              Waiting
            </span>
          </div>

          <button
            class="download-btn"
            id="download-${index}"
            disabled
          >
            Compress First
          </button>

        </div>
      `;

      previewGrid.appendChild(card);

    };

    reader.readAsDataURL(file);

  });

}

compressBtn.addEventListener('click', async () => {

  if(uploadedFiles.length === 0){

    alert('Please upload images first');

    return;

  }

  compressedFiles = [];

  statusText.innerText = 'Compressing images...';

  const quality =
    Number(qualitySlider.value) / 100;

  const prefix =
    prefixInput.value.trim() || 'compressed_image';

  const format =
    formatSelect.value;

  const cards =
    document.querySelectorAll('.preview-card');

  for(let i=0;i<uploadedFiles.length;i++){

    const file = uploadedFiles[i];

    const compressedBlob =
      await compressImage(file,quality,format);

    const extension =
      format === 'image/jpeg'
      ? 'jpg'
      : format.split('/')[1];

    const fileName =
      `${prefix}_${i+1}.${extension}`;

    compressedFiles.push({
      blob:compressedBlob,
      name:fileName
    });

    const imageURL =
      URL.createObjectURL(compressedBlob);

    const status =
      cards[i].querySelector(`#status-${i}`);

    status.innerText = 'Compressed';

    const row = document.createElement('div');

    row.className = 'info-row';

    row.innerHTML = `
      <span>Compressed</span>
      <span>${formatBytes(compressedBlob.size)}</span>
    `;

    cards[i]
      .querySelector('.preview-info')
      .appendChild(row);

    const button =
      cards[i].querySelector(`#download-${i}`);

    button.disabled = false;

    button.innerText = 'Download';

    button.onclick = () => {

      downloadFile(imageURL,fileName);

    };

  }

  statusText.innerText =
    'Compression completed';

});

function compressImage(file,quality,format){

  return new Promise((resolve) => {

    const img = new Image();

    const reader = new FileReader();

    reader.onload = (e) => {
      img.src = e.target.result;
    };

    img.onload = () => {

      const canvas =
        document.createElement('canvas');

      const ctx =
        canvas.getContext('2d');

      let width = img.width;
      let height = img.height;

      const maxSize = 2500;

      if(width > maxSize || height > maxSize){

        if(width > height){

          height *= maxSize / width;
          width = maxSize;

        }else{

          width *= maxSize / height;
          height = maxSize;

        }

      }

      canvas.width = width;
      canvas.height = height;

      ctx.drawImage(img,0,0,width,height);

      canvas.toBlob((blob) => {

        resolve(blob);

      },format,quality);

    };

    reader.readAsDataURL(file);

  });

}

function downloadFile(url,fileName){

  const a = document.createElement('a');

  a.href = url;
  a.download = fileName;

  document.body.appendChild(a);

  a.click();

  document.body.removeChild(a);

}

downloadAllBtn.addEventListener('click', () => {

  if(compressedFiles.length === 0){

    alert('No compressed images');

    return;

  }

  compressedFiles.forEach((file,index) => {

    const url =
      URL.createObjectURL(file.blob);

    setTimeout(() => {

      downloadFile(url,file.name);

    },index * 300);

  });

});

</script>

</body>
      </html>
