<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receipt Scanner PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

.container{padding:16px;}

#editor{
  position:relative;
  height:60vh;
  background:black;
  overflow:hidden;
  border-radius:10px;
}

#img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.corner{
  position:absolute;
  width:18px;
  height:18px;
  background:#22c55e;
  border-radius:50%;
  transform:translate(-50%,-50%);
  touch-action:none;
}

input,button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:8px;
}

button{
  background:#22c55e;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>Receipt Scanner PRO</h2>

<input type="date" id="date">
<input type="text" id="purpose" placeholder="Purpose">
<input type="number" id="amount" placeholder="Amount">
<input type="file" id="file">

<div id="editor">
<img id="img">

<div class="corner" id="c1"></div>
<div class="corner" id="c2"></div>
<div class="corner" id="c3"></div>
<div class="corner" id="c4"></div>

</div>

<button onclick="applyCrop()">Scan Crop</button>
<button onclick="generatePDF()">Generate PDF</button>

</div>

<script>
const img=document.getElementById('img');
const file=document.getElementById('file');
const box=document.getElementById('editor');

let corners=[
{x:40,y:60,id:'c1'},
{x:300,y:60,id:'c2'},
{x:300,y:400,id:'c3'},
{x:40,y:400,id:'c4'}
];

let dragging=null;

// ==========================
// IMAGE LOAD
// ==========================
file.onchange=e=>{
let r=new FileReader();
r.onload=ev=>img.src=ev.target.result;
r.readAsDataURL(e.target.files[0]);
};

// ==========================
// DRAG CORNERS
// ==========================
corners.forEach(c=>{
let el=document.getElementById(c.id);

el.onmousedown=el.ontouchstart=()=>{
dragging=c;
};

window.onmousemove=window.ontouchmove=(e)=>{
if(!dragging)return;

let r=box.getBoundingClientRect();
let x=e.touches?e.touches[0].clientX:e.clientX;
let y=e.touches?e.touches[0].clientY:e.clientY;

dragging.x=x-r.left;
dragging.y=y-r.top;

update();
};

window.onmouseup=window.ontouchend=()=>dragging=null;
});

function update(){
corners.forEach(c=>{
let el=document.getElementById(c.id);
el.style.left=c.x+'px';
el.style.top=c.y+'px';
});
}
update();

// ==========================
// IMAGE COMPRESSOR
// ==========================
function compressImage(src, quality=0.75, maxW=1200){
return new Promise(resolve=>{
let i=new Image();
i.src=src;

i.onload=()=>{
let c=document.createElement('canvas');
let ctx=c.getContext('2d');

let scale=maxW/i.width;
c.width=maxW;
c.height=i.height*scale;

ctx.drawImage(i,0,0,c.width,c.height);

resolve(c.toDataURL('image/jpeg',quality));
};
});
}

// ==========================
// AUTO EDGE CROP (lightweight)
// ==========================
function applyCrop(){

let image=new Image();
image.src=img.src;

image.onload=async ()=>{

// 🔥 compress first
let compressed = await compressImage(image.src);
image.src = compressed;

let canvas=document.createElement('canvas');
let ctx=canvas.getContext('2d');

canvas.width=1000;
canvas.height=1400;

let r=box.getBoundingClientRect();

let sx=corners.map(p=>p.x*(image.width/r.width));
let sy=corners.map(p=>p.y*(image.height/r.height));

// 🔥 auto bounding crop
let minX=Math.min(...sx);
let maxX=Math.max(...sx);
let minY=Math.min(...sy);
let maxY=Math.max(...sy);

ctx.drawImage(
image,
minX,minY,
maxX-minX,
maxY-minY,
0,0,
canvas.width,
canvas.height
);

img.src=canvas.toDataURL("image/jpeg",0.85);
};
}

// ==========================
// PDF EXPORT
// ==========================
function generatePDF(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF('p','mm','a4');

let y=20;

doc.setFontSize(18);
doc.text("COMPANY RECEIPT REPORT",10,y);

y+=10;

doc.setFontSize(11);

doc.text("Date: "+document.getElementById('date').value,10,y); y+=6;
doc.text("Purpose: "+document.getElementById('purpose').value,10,y); y+=6;
doc.text("Amount: RM "+document.getElementById('amount').value,10,y);

y+=10;

// compress again for PDF safety
compressImage(img.src,0.7).then(finalImg=>{
doc.addImage(finalImg,'JPEG',10,y,180,120);
doc.save("receipt.pdf");
});
}

</script>

</body>
                              </html>
