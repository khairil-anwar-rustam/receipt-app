<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receipt Report Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:#fff;
}

.container{
  padding:16px;
  max-width:900px;
  margin:auto;
}

h1{
  font-size:22px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:#000;
  font-weight:bold;
  margin-top:10px;
}

.receipt-list{
  margin-top:15px;
}

.card{
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.card img{
  width:100%;
  border-radius:8px;
  margin-top:8px;
}
</style>
</head>

<body>
<div class="container">
  <h1>Receipt Report Generator</h1>

  <input type="date" id="date">
  <input type="text" id="purpose" placeholder="Purpose (e.g. materials, fuel, etc)">
  <input type="number" id="amount" placeholder="Amount (optional)">
  <input type="file" id="receipt" accept="image/*">

  <button onclick="addReceipt()">Add Receipt</button>

  <div class="receipt-list" id="list"></div>

  <button onclick="generatePDF()">Generate PDF Report</button>
</div>

<script>
const { jsPDF } = window.jspdf;
let receipts = [];

function compressImage(file){
  return new Promise(resolve => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = () => {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      const maxWidth = 600;
      const scale = maxWidth / img.width;

      canvas.width = maxWidth;
      canvas.height = img.height * scale;

      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      resolve(canvas.toDataURL('image/jpeg', 0.7));
    };

    reader.readAsDataURL(file);
  });
}

async function addReceipt(){
  const date = document.getElementById('date').value;
  const purpose = document.getElementById('purpose').value;
  const amount = document.getElementById('amount').value;
  const file = document.getElementById('receipt').files[0];

  if(!file) return alert('Upload receipt image');

  const imgData = await compressImage(file);

  receipts.push({ date, purpose, amount, imgData });

  renderList();
}

function renderList(){
  const list = document.getElementById('list');
  list.innerHTML = '';

  receipts.forEach(r => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <div><b>Date:</b> ${r.date}</div>
      <div><b>Purpose:</b> ${r.purpose}</div>
      <div><b>Amount:</b> ${r.amount || '-'} </div>
      <img src="${r.imgData}">
    `;
    list.appendChild(div);
  });
}

function generatePDF(){
  const doc = new jsPDF('p','mm','a4');

  let y = 15;

  doc.setFontSize(16);
  doc.text('Receipt Report', 10, y);

  y += 10;

  doc.setFontSize(10);

  receipts.forEach((r, i) => {

    if(y > 250){
      doc.addPage();
      y = 15;
    }

    doc.text(`Date: ${r.date}`, 10, y);
    y += 5;

    doc.text(`Purpose: ${r.purpose}`, 10, y);
    y += 5;

    doc.text(`Amount: ${r.amount || '-'}`, 10, y);
    y += 5;

    doc.addImage(r.imgData, 'JPEG', 10, y, 90, 60);

    y += 70;
  });

  doc.save('receipt-report.pdf');
}
</script>
</body>
  </html>
