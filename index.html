<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receipt Scanner Report</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

.container{
  padding:16px;
}

#editor{
  position:relative;
  height:60vh;
  background:black;
  overflow:hidden;
  border-radius:10px;
}

#img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.corner{
  position:absolute;
  width:18px;
  height:18px;
  background:#22c55e;
  border-radius:50%;
  transform:translate(-50%,-50%);
  touch-action:none;
}

input,button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:8px;
}

button{
  background:#22c55e;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>Receipt Scanner Report</h2>

<input type="date" id="date">
<input type="text" id="purpose" placeholder="Purpose">
<input type="number" id="amount" placeholder="Amount">
<input type="file" id="file">

<div id="editor">
<img id="img">

<div class="corner" id="c1"></div>
<div class="corner" id="c2"></div>
<div class="corner" id="c3"></div>
<div class="corner" id="c4"></div>

</div>

<button onclick="applyCrop()">Apply Scan Crop</button>
<button onclick="generatePDF()">Generate PDF</button>

</div>

<script>
const img = document.getElementById('img');
const file = document.getElementById('file');

let corners = [
{x:40,y:60,id:'c1'},
{x:300,y:60,id:'c2'},
{x:300,y:400,id:'c3'},
{x:40,y:400,id:'c4'}
];

let dragging = null;
let rectBox = document.getElementById('editor');

// LOAD IMAGE
file.onchange = e=>{
const reader = new FileReader();
reader.onload = ev=>{
img.src = ev.target.result;
};
reader.readAsDataURL(e.target.files[0]);
};

// INIT DRAG CORNERS
corners.forEach(c=>{
let el=document.getElementById(c.id);

el.addEventListener('mousedown',start);
el.addEventListener('touchstart',start);

function start(e){
dragging=c;
document.addEventListener('mousemove',move);
document.addEventListener('touchmove',move);
document.addEventListener('mouseup',end);
document.addEventListener('touchend',end);
}

function move(e){
let r=rectBox.getBoundingClientRect();
let x=e.touches?e.touches[0].clientX:e.clientX;
let y=e.touches?e.touches[0].clientY:e.clientY;

c.x = x - r.left;
c.y = y - r.top;

update();
}

function end(){
dragging=null;
}
});

// UPDATE CORNERS
function update(){
corners.forEach(c=>{
let el=document.getElementById(c.id);
el.style.left=c.x+'px';
el.style.top=c.y+'px';
});
}
update();

// =========================
// SCAN WARP CROPPER (CORE)
// =========================
function applyCrop(){

let image = new Image();
image.src = img.src;

image.onload = ()=>{

let canvas=document.createElement('canvas');
let ctx=canvas.getContext('2d');

let w=1000,h=1400;
canvas.width=w;
canvas.height=h;

let r=rectBox.getBoundingClientRect();

let scaleX=image.width/r.width;
let scaleY=image.height/r.height;

let p=corners.map(pt=>({
x:pt.x*scaleX,
y:pt.y*scaleY
}));

function warp(sx,sy,dx,dy){
ctx.save();
ctx.beginPath();
ctx.moveTo(dx[0],dy[0]);
ctx.lineTo(dx[1],dy[1]);
ctx.lineTo(dx[2],dy[2]);
ctx.lineTo(dx[3],dy[3]);
ctx.closePath();
ctx.clip();

let denom = (sx[0]*(sy[1]-sy[2]+sy[3]-sy[0]));

ctx.drawImage(image,0,0);
ctx.restore();
}

// simple quad draw (scanner style)
ctx.drawImage(image,
p[0].x,p[0].y,
p[1].x-p[0].x,p[3].y-p[0].y,
0,0,w,h
);

img.src = canvas.toDataURL("image/jpeg",1);
};

}

// =========================
// PDF GENERATOR
// =========================
function generatePDF(){

const doc=new jsPDF('p','mm','a4');

let y=20;

doc.setFontSize(18);
doc.text("COMPANY RECEIPT REPORT",10,y);

y+=10;

doc.setFontSize(11);

doc.text("Date: "+document.getElementById('date').value,10,y);
y+=6;

doc.text("Purpose: "+document.getElementById('purpose').value,10,y);
y+=6;

doc.text("Amount: RM "+document.getElementById('amount').value,10,y);

y+=10;

doc.addImage(img.src,'JPEG',10,y,180,120);

doc.save("receipt-report.pdf");

}

</script>

</body>
  </html>
