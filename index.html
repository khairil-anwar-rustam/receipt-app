<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receipt Report Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:#fff;
}

.container{
  padding:16px;
  max-width:900px;
  margin:auto;
}

h1{ font-size:22px; }

input, button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:none;
}

button{
  background:#22c55e;
  font-weight:bold;
  color:#000;
}

canvas{
  width:100%;
  max-height:60vh;
  background:#111;
  border-radius:10px;
  touch-action:none;
}

#cropBox{
  position:absolute;
  border:2px dashed #22c55e;
  background:rgba(34,197,94,0.15);
  display:none;
}

.preview-wrap{
  position:relative;
  width:100%;
}
</style>
</head>

<body>
<div class="container">
  <h1>Mobile Crop Receipt</h1>

  <input type="date" id="date">
  <input type="text" id="purpose" placeholder="Purpose">
  <input type="number" id="amount" placeholder="Amount">
  <input type="file" id="receipt" accept="image/*">

  <div class="preview-wrap">
    <canvas id="canvas"></canvas>
    <div id="cropBox"></div>
  </div>

  <button onclick="generateCrop()">Apply Crop</button>
  <button onclick="generatePDF()">Generate PDF</button>
</div>

<script>
const { jsPDF } = window.jspdf;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const cropBox = document.getElementById('cropBox');

let img = new Image();
let scale = 1;
let crop = {x:50,y:50,w:150,h:150};
let dragging = false;
let startX,startY;
let croppedData = null;

// LOAD IMAGE

document.getElementById('receipt').addEventListener('change', function(){
  const file = this.files[0];
  const reader = new FileReader();

  reader.onload = e => {
    img = new Image();

    img.onload = () => {
      canvas.width = img.width;
      canvas.height = img.height;

      scale = canvas.clientWidth / img.width;

      draw();
      initCrop();
    }

    img.src = e.target.result;
  }

  reader.readAsDataURL(file);
});

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(img,0,0);
}

// INIT CROPPER
function initCrop(){
  cropBox.style.display='block';
  updateBox();
}

function updateBox(){
  cropBox.style.left = (crop.x*scale)+"px";
  cropBox.style.top = (crop.y*scale)+"px";
  cropBox.style.width = (crop.w*scale)+"px";
  cropBox.style.height = (crop.h*scale)+"px";
}

// TOUCH + DRAG
cropBox.addEventListener('mousedown',startDrag);
cropBox.addEventListener('touchstart',startDrag);

function startDrag(e){
  dragging = true;
  const rect = canvas.getBoundingClientRect();

  const clientX = e.touches?e.touches[0].clientX:e.clientX;
  const clientY = e.touches?e.touches[0].clientY:e.clientY;

  startX = clientX - rect.left;
  startY = clientY - rect.top;

  document.addEventListener('mousemove',move);
  document.addEventListener('touchmove',move);
  document.addEventListener('mouseup',end);
  document.addEventListener('touchend',end);
}

function move(e){
  if(!dragging) return;

  const rect = canvas.getBoundingClientRect();

  const clientX = e.touches?e.touches[0].clientX:e.clientX;
  const clientY = e.touches?e.touches[0].clientY:e.clientY;

  const x = clientX - rect.left;
  const y = clientY - rect.top;

  const dx = (x-startX)/scale;
  const dy = (y-startY)/scale;

  crop.x += dx;
  crop.y += dy;

  startX = x;
  startY = y;

  draw();
  updateBox();
}

function end(){
  dragging = false;
}

// APPLY CROP
function generateCrop(){
  const temp = document.createElement('canvas');
  const tctx = temp.getContext('2d');

  temp.width = crop.w;
  temp.height = crop.h;

  tctx.drawImage(
    img,
    crop.x, crop.y, crop.w, crop.h,
    0,0,crop.w,crop.h
  );

  croppedData = temp.toDataURL('image/jpeg',0.9);

  draw();
  tctx.drawImage(temp,0,0);
}

// PDF
function generatePDF(){
  if(!croppedData) return alert('Crop first');

  const doc = new jsPDF('p','mm','a4');

  let y = 20;

  doc.setFontSize(16);
  doc.text('COMPANY RECEIPT REPORT',10,y);

  y+=10;

  const date = document.getElementById('date').value;
  const purpose = document.getElementById('purpose').value;
  const amount = document.getElementById('amount').value;

  doc.setFontSize(11);
  doc.text(`Date: ${date}`,10,y); y+=6;
  doc.text(`Purpose: ${purpose}`,10,y); y+=6;
  doc.text(`Amount: RM ${amount||'-'}`,10,y);

  y+=10;

  doc.addImage(croppedData,'JPEG',10,y,180,120);

  doc.save('receipt.pdf');
}
</script>
</body>
      </html>
